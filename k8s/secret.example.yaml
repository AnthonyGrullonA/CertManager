# PLANTILLA del Secret con los valores sensibles. Cópiala a `app-secret.yaml`
# (gitignored: k8s/*-secret.yaml) y completa los valores ANTES de aplicar.
# Recomendado: generarlo con `kubectl create secret generic ...` o un gestor de
# secretos (Vault/SealedSecrets), NO versionar valores reales (repo público).
#
#   kubectl -n certmanager create secret generic certmanager-secrets \
#     --from-literal=DJANGO_SECRET_KEY='<generar>' \
#     --from-literal=DB_PASSWORD='<clave de Claro>' \
#     --from-literal=CF_OWNER_PASSWORD='<clave del Owner>'
apiVersion: v1
kind: Secret
metadata:
  name: certmanager-secrets
  namespace: certmanager
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "<GENERAR-SECRET-KEY>"
  DB_PASSWORD: "<CLAVE-BD-CLARO>"
  CF_OWNER_PASSWORD: "<CLAVE-OWNER>"
