# Configuración NO secreta del aplicativo. Ajusta los valores a tu entorno.
apiVersion: v1
kind: ConfigMap
metadata:
  name: certmanager-config
  namespace: certmanager
data:
  DJANGO_SETTINGS_MODULE: "config.settings.prod"
  ALLOWED_HOSTS: "certmanager.claro.com.do"
  CSRF_TRUSTED_ORIGINS: "https://certmanager.claro.com.do"
  # Base de datos MySQL EXTERNA (la provee Claro) — valores por separado.
  DB_NAME: "certmanager"
  DB_USER: "certmanager"
  DB_HOST: "mysql.interno.claro.com.do"
  DB_PORT: "3306"
  LOG_DIR: "/var/log/certmanager"
  OBSFORGE_ENABLED: "0"
  CF_OWNER_EMAIL: "jairol_grullon@claro.com.do"
