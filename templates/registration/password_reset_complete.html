{% load static %}{% load forge_icons %}{% load i18n %}
<!DOCTYPE html>
<html lang="es-do" data-theme="light" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contraseña actualizada · CertManager</title>
  <link rel="stylesheet" href="{% static 'css/forge.css' %}?v={{ forge_assets_v }}">
</head>
<body class="forge-body h-full" style="margin:0">
  <div style="display:flex;min-height:100vh;align-items:center;justify-content:center;padding:32px;background:var(--surface-page)">
    <div style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:22px">
      <div class="card" style="display:flex;flex-direction:column;gap:16px;align-items:flex-start">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:var(--radius-pill);background:var(--green-softer, #dcfce7);color:var(--green-solid, #16a34a)">{% icon "circle-check" size=22 %}</span>
        <div>
          <h1 style="margin:0;font-family:var(--font-sans);font-weight:600;font-size:var(--text-h1);letter-spacing:-0.01em;color:var(--text-primary)">{% trans "Contraseña actualizada" %}</h1>
          <p style="margin:8px 0 0;font-family:var(--font-sans);font-size:var(--text-body);line-height:1.6;color:var(--text-tertiary)">{% trans "Tu contraseña se cambió correctamente. Ya puedes iniciar sesión con ella." %}</p>
        </div>
        <a href="{% url 'login' %}" class="btn-primary" style="width:100%;justify-content:center">{% trans "Iniciar sesión" %}</a>
      </div>
    </div>
  </div>
</body>
</html>
