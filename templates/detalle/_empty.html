{% load forge_icons %}
{% comment %}
Estado vacío de una pestaña del detalle (sin last_check / sin datos para la
sección). Uso:
  {% include "detalle/_empty.html" with icon="search" text="Sin datos…" %}
{% endcomment %}
<div class="detalle-empty" role="status"
     style="display:flex; flex-direction:column; align-items:center; gap:10px; padding:32px 16px; text-align:center; color:var(--text-tertiary);">
  <span style="display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:999px; background:var(--surface-hover); color:var(--text-tertiary);">
    {% icon icon|default:"info" size=20 %}
  </span>
  <p style="font-family:var(--font-sans); font-size:var(--text-sm); color:var(--text-tertiary); max-width:380px; margin:0;">{{ text }}</p>
</div>
