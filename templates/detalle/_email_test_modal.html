{% load forge_icons i18n %}
<div class="forge-modal" data-forge-modal>
  <div class="forge-modal__scrim" data-forge-modal-close></div>
  <div class="forge-modal__panel" role="dialog" aria-modal="true"
       aria-label="{% trans 'Probar correo de certificado' %}" style="width:460px;">
    <div class="forge-modal__header">
      <div class="min-w-0 flex-1">
        <div class="forge-modal__title">{% trans "Probar correo" %}</div>
        <div class="forge-modal__subtitle">{{ cert.domain }}:{{ cert.port }}</div>
      </div>
      <button type="button" class="forge-modal__close" aria-label="{% trans 'Cerrar' %}" data-forge-modal-close>
        {% icon "x" size=18 %}
      </button>
    </div>

    <form hx-post="{% url 'cert-email-test' cert.id %}"
          hx-target="#modal-root"
          hx-swap="innerHTML">
      {% csrf_token %}
      <div class="forge-modal__body">
        {% if error %}
          <div class="forge-uform__error" style="margin-bottom:12px;">{{ error }}</div>
        {% endif %}
        {% if form.non_field_errors %}
          <div class="forge-uform__error" style="margin-bottom:12px;">{{ form.non_field_errors }}</div>
        {% endif %}
        <label class="forge-ufield">
          <span class="forge-ufield__label">{% trans "Correo destino" %}</span>
          {{ form.email }}
          {% if form.email.errors %}<span class="forge-ufield__error">{{ form.email.errors|join:" " }}</span>{% endif %}
        </label>
        <p class="forge-ufield__hint" style="margin-top:10px;">
          {% trans "Esta prueba no usa los responsables reales del certificado." %}
        </p>
      </div>
      <div class="forge-modal__footer">
        <button type="button" class="btn-outline" data-forge-modal-close>{% trans "Cancelar" %}</button>
        <button type="submit" class="btn-primary">{% icon "mail" size=16 %} {% trans "Enviar prueba" %}</button>
      </div>
    </form>
  </div>
</div>
