# NGINX del despliegue Docker: termina TLS en 443 con el wildcard *.claro.com.do
# y hace reverse proxy a gunicorn (web:8000). Redirige 80 -> 443.
# El certificado se monta desde ./tls/ (ver CLARO_NECESIDAD/04 y .gitignore).

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/tls/claro-wildcard.crt;   # cert + cadena intermedia
    ssl_certificate_key /etc/nginx/tls/claro-wildcard.key;   # clave privada
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # Django confía en este header (prod)
    }

    location = /health/ {
        proxy_pass http://web:8000;
        access_log off;
    }
}
